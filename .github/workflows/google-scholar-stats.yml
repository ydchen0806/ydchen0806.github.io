name: Get Google Scholar Stats

# 定时任务说明：
# - cron 使用 UTC。'0 1 * * *' = 每天 UTC 01:00（北京时间 09:00），避开整点负载高峰。
# - GitHub 若 60 天无仓库活动，会暂停 scheduled workflow；到 Actions 里点一次 “Enable workflow” 即可恢复。
on:
  schedule:
    - cron: '0 1 * * *'  # 每天 UTC 01:00（约北京时间 09:00）
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Fetch Google Scholar stats
        env:
          GOOGLE_SCHOLAR_ID: 'hCvlj5cAAAAJ'
          # 在 GitHub Secrets 中设置 SERPAPI_KEY
          # 注册获取免费 API Key: https://serpapi.com/ (每月100次免费)
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        timeout-minutes: 10
        run: |
          echo "=========================================="
          echo "获取 Google Scholar 统计数据..."
          echo "=========================================="
          
          cd google_scholar_crawler
          
          # 优先使用 SerpAPI（更稳定）
          if [ -n "$SERPAPI_KEY" ]; then
            echo "使用 SerpAPI 获取数据..."
            python serpapi_crawler.py
            
            echo ""
            echo "=========================================="
            echo "生成论文详细信息..."
            echo "=========================================="
            python paper_generator.py || echo "论文生成器运行失败，继续..."
          else
            echo "SERPAPI_KEY 未设置，使用传统方法..."
            python robust_crawler.py
          fi
          
          cd ..

      - name: Update pub.md citations
        run: |
          echo "=========================================="
          echo "更新 pub.md 中的引用数..."
          echo "=========================================="
          python google_scholar_crawler/update_pub_citations.py || echo "pub.md 更新失败，继续..."

      - name: Verify output files
        run: |
          echo "检查生成的文件..."
          ls -lh google_scholar_crawler/results/
          echo ""
          echo "=== gs_data_shieldsio.json 内容 ==="
          cat google_scholar_crawler/results/gs_data_shieldsio.json
          echo ""
          echo "=== gs_data.json 摘要 ==="
          python -c "import json; data=json.load(open('google_scholar_crawler/results/gs_data.json')); print(f\"Name: {data['name']}\nCitations: {data['citedby']}\nSource: {data.get('source', 'unknown')}\")"

      - name: Commit all main branch changes
        run: |
          # 配置 Git
          git config --global user.email "yindachen@mail.ustc.edu.cn"
          git config --global user.name "ydchen0806"
          
          # 提交所有更改（包括 serpapi_crawler.py 的 fallback 更新）
          git add -A
          if git diff --staged --quiet; then
            echo "main 分支没有变化需要提交"
          else
            git commit -m "Auto-update: citations, fallback data [skip ci]"
            git push origin main
            echo "✅ main 分支更改已提交"
          fi

      - name: Update google-scholar-stats branch
        run: |
          # 配置 Git
          git config --global user.email "yindachen@mail.ustc.edu.cn"
          git config --global user.name "ydchen0806"
          
          # 保存生成的文件到临时目录
          mkdir -p /tmp/scholar_data
          cp -r google_scholar_crawler/results/* /tmp/scholar_data/
          
          # 切换到目标分支（如果不存在则创建）
          git fetch origin google-scholar-stats 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/google-scholar-stats; then
            git checkout google-scholar-stats
            git pull origin google-scholar-stats
          else
            git checkout --orphan google-scholar-stats
          fi
          
          # 清理分支内容
          git rm -rf . 2>/dev/null || true
          git clean -fd
          
          # 复制新数据
          cp -r /tmp/scholar_data/* .
          
          # 创建 README
          cat > README.md << EOF
          # Google Scholar Statistics
          
          This branch contains automatically updated Google Scholar statistics.
          
          ## Files
          
          - \`gs_data.json\`: Complete scholar profile data
          - \`gs_data_shieldsio.json\`: Citations badge (Shields.io format)
          - \`gs_hindex.json\`: H-Index badge
          - \`gs_i10index.json\`: I10-Index badge
          - \`citation_trend.svg\`: Citation trend chart
          - \`first_author_papers.json\`: First-author papers list
          - \`high_cited_papers.json\`: High-cited papers (>=50)
          - \`all_papers.json\`: All papers with details
          - \`auto_publications.md\`: Auto-generated publication list
          
          **Last updated:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          
          ## Usage
          
          ### Citation Badge
          \`\`\`markdown
          ![Citations](https://img.shields.io/endpoint?url=https://raw.githubusercontent.com/ydchen0806/ydchen0806.github.io/google-scholar-stats/gs_data_shieldsio.json&logo=google-scholar&logoColor=white)
          \`\`\`
          
          ### Citation Trend Chart
          \`\`\`markdown
          ![Citation Trend](https://raw.githubusercontent.com/ydchen0806/ydchen0806.github.io/google-scholar-stats/citation_trend.svg)
          \`\`\`
          
          ---
          *Updated daily via GitHub Actions | Source: SerpAPI*
          EOF
          
          # 提交更改
          git add .
          if git diff --staged --quiet; then
            echo "没有变化需要提交"
          else
            git commit -m "Update Google Scholar stats - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push -f origin google-scholar-stats
            echo "✅ 成功推送更新"
          fi
          
      - name: Summary
        if: success()
        run: |
          echo "### ✅ Google Scholar 统计信息更新成功" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 **查看数据分支:** https://github.com/${{ github.repository }}/tree/google-scholar-stats" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Raw JSON:** https://raw.githubusercontent.com/${{ github.repository }}/google-scholar-stats/gs_data_shieldsio.json" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          CITATIONS=$(python -c "import json; print(json.load(open('google_scholar_crawler/results/gs_data.json'))['citedby'])" 2>/dev/null || echo "N/A")
          SOURCE=$(python -c "import json; print(json.load(open('google_scholar_crawler/results/gs_data.json')).get('source', 'unknown'))" 2>/dev/null || echo "N/A")
          echo "📈 **当前引用数:** $CITATIONS (来源: $SOURCE)" >> $GITHUB_STEP_SUMMARY
